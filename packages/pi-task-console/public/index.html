<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>公安指挥任务控制台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="control-edge-right">
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="mark" aria-hidden="true">警</div>
          <h1>公安指挥任务控制台</h1>
        </div>
        <div class="top-actions" aria-label="运行操作">
          <button
            class="btn test-trigger"
            type="button"
            aria-label="开始测试"
            title="开始测试"
            data-test-run
          >
            开始测试
          </button>
          <button class="btn" type="button" aria-label="重置运行" title="重置运行" data-reset-run disabled>
            重置
          </button>
          <span class="status loading" data-run-status>
            <span class="status-symbol" aria-hidden="true">○</span>
            <span data-run-status-text>未启动</span>
          </span>
        </div>
      </header>

      <div class="workspace">
        <main class="card-workspace" aria-label="卡片工作区">
          <div class="scroll-area card-board" data-card-board>
            <section class="card-grid" data-card-grid>
              <div class="empty-state" data-empty-state>暂无业务卡片</div>
            </section>
          </div>
        </main>

        <aside class="side-panel" aria-label="智能协同">
          <button
            class="control-rail"
            type="button"
            data-toggle-control
            data-rail
            aria-label="展开智能协同"
            title="展开智能协同"
          >
            <span class="rail-label">智能协同</span>
          </button>

          <div class="control-full">
            <div class="sidebar-tabs-head">
              <div class="tab-list" role="tablist" aria-label="智能协同视图">
                <button
                  class="tab-button"
                  type="button"
                  role="tab"
                  id="sidebar-tab-smart"
                  aria-controls="sidebar-panel-smart"
                  aria-selected="true"
                  tabindex="0"
                  data-sidebar-tab="smart"
                >
                  智能协同
                </button>
                <button
                  class="tab-button"
                  type="button"
                  role="tab"
                  id="sidebar-tab-history"
                  aria-controls="sidebar-panel-history"
                  aria-selected="false"
                  tabindex="-1"
                  data-sidebar-tab="history"
                >
                  历史
                </button>
                <button
                  class="tab-button"
                  type="button"
                  role="tab"
                  id="sidebar-tab-todo"
                  aria-controls="sidebar-panel-todo"
                  aria-selected="false"
                  tabindex="-1"
                  data-sidebar-tab="todo"
                >
                  待办
                </button>
              </div>
              <button
                class="btn icon"
                type="button"
                data-toggle-control
                aria-label="收起智能协同"
                title="收起智能协同"
              >
                ›
              </button>
            </div>

            <div class="sidebar-tab-panels">
              <section
                class="tab-panel smart-sidebar"
                role="tabpanel"
                id="sidebar-panel-smart"
                aria-labelledby="sidebar-tab-smart"
                data-tab-panel="smart"
              >
                <section class="pane messages-pane" aria-label="后端回执与任务消息">
                  <div class="pane-head">
                    <h2>智能协同</h2>
                  </div>

                  <div class="pane-body">
                    <div class="scroll-area messages" aria-live="polite" data-messages></div>

                    <form class="composer" data-composer>
                      <div class="composer-line">
                        <textarea aria-label="输入新指令" data-instruction></textarea>
                        <div class="composer-actions">
                          <button
                            class="btn primary main-action"
                            type="submit"
                            aria-label="暂不支持对话功能"
                            title="暂不支持对话功能"
                            data-main-action
                            disabled
                          >
                            <span data-main-action-text>开始</span>
                          </button>
                        </div>
                      </div>
                    </form>
                  </div>
                </section>

                <section class="pane workflow-pane" aria-label="预案指引">
                  <div class="pane-head">
                    <h2>预案指引</h2>
                    <span class="phase-progress" data-total-progress hidden></span>
                  </div>

                  <div class="pane-body only-scroll">
                    <div class="scroll-area flow-list" data-flow-list></div>
                  </div>
                </section>
              </section>

              <section
                class="tab-panel tab-panel-empty"
                role="tabpanel"
                id="sidebar-panel-history"
                aria-labelledby="sidebar-tab-history"
                data-tab-panel="history"
                hidden
              >
                <div class="scroll-area">
                  <div class="sidebar-empty-state">暂无历史会话</div>
                </div>
              </section>

              <section
                class="tab-panel tab-panel-empty"
                role="tabpanel"
                id="sidebar-panel-todo"
                aria-labelledby="sidebar-tab-todo"
                data-tab-panel="todo"
                hidden
              >
                <div class="scroll-area">
                  <div class="sidebar-empty-state">暂无待办事件</div>
                </div>
              </section>
            </div>
          </div>
        </aside>
      </div>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
