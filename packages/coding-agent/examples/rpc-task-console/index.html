<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>公安指挥任务控制台</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="control-edge-right">
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="mark" aria-hidden="true">警</div>
          <h1>公安指挥任务控制台</h1>
        </div>
        <div class="top-actions" aria-label="运行操作">
          <button class="btn test-trigger" type="button" data-test-run>测试</button>
          <span class="status loading" data-run-status>
            <span class="status-symbol" aria-hidden="true">○</span>
            <span data-run-status-text>未启动</span>
          </span>
        </div>
      </header>

      <div class="workspace">
        <main class="card-workspace" aria-label="卡片工作区">
          <div class="selection-bar">
            <div class="selection-title">
              <h2>任务卡片</h2>
              <p data-selected-task>等待后端快照</p>
            </div>
          </div>
          <div class="scroll-area card-board" data-card-board>
            <section class="card-grid" data-card-grid>
              <div class="empty-state" data-empty-state>暂无业务卡片</div>
            </section>
          </div>
        </main>

        <aside class="side-panel" aria-label="智能协同">
          <button
            class="control-rail"
            type="button"
            data-toggle-control
            data-rail
            aria-label="展开智能协同"
            title="展开智能协同"
          >
            <span class="rail-label">智能协同</span>
          </button>

          <div class="control-full">
            <section class="pane messages-pane" aria-label="后端回执与任务消息">
              <div class="pane-head">
                <h2>智能协同</h2>
                <button
                  class="btn icon"
                  type="button"
                  data-toggle-control
                  aria-label="收起智能协同"
                  title="收起智能协同"
                >
                  ›
                </button>
              </div>

              <div class="pane-body">
                <div class="scroll-area messages" aria-live="polite" data-messages>
                  <article class="message system empty-message">
                    <p>等待后端回执。</p>
                  </article>
                </div>

                <form class="composer" data-composer>
                  <div class="composer-line">
                    <textarea aria-label="输入新指令" data-instruction></textarea>
                    <button
                      class="btn icon primary"
                      type="submit"
                      aria-label="发送指令"
                      title="发送指令"
                      data-submit
                      disabled
                    >
                      ▶
                    </button>
                    <button
                      class="btn icon stop"
                      type="button"
                      aria-label="停止运行"
                      title="停止运行"
                      data-stop
                      disabled
                    >
                      ■
                    </button>
                  </div>
                </form>
              </div>
            </section>

            <section class="pane workflow-pane" aria-label="预案指引">
              <div class="pane-head">
                <h2>预案指引</h2>
                <span class="phase-progress" data-total-progress>0 / 0</span>
              </div>

              <div class="pane-body only-scroll">
                <div class="scroll-area flow-list" data-flow-list></div>
              </div>
            </section>
          </div>
        </aside>
      </div>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
